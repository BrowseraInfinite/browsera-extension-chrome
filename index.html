<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniTab</title>
    <!-- Montserrat Alternates Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main id="ui-container">
    <div id="clock-container">
        <div id="time">00:00</div>
        <div id="date">Tuesday, June 23</div>
    </div>

    <div id="help-footer">
        Press <strong>Ctrl + Space</strong> to search
    </div>
</main>

    <div id="spotlight" class="hidden">
        <div class="search-input-wrapper">
            <input type="text" id="spotlight-input" placeholder="Search or type a command..." autocomplete="off">
        </div>
        <div id="command-menu" class="hidden">
            <div id="menu-items"></div>
        </div>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>Add Custom Command</h3>
            <input type="text" id="cmd-key" placeholder="Key (e.g. .d)">
            <input type="text" id="cmd-action" placeholder="Action (e.g. w discord.com)">
            <button id="save-cmd">Save</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="searchbar.js"></script>
</body>
</html>
